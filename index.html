<!DOCTYPE html>
<html>

<head>
<title>Wedding RSVP</title>

<style>

body{
font-family: Arial;
text-align:center;
margin:0;
height:100vh;

background-image: url("background.jpeg");
background-size: contain;
background-position: center;
background-repeat: no-repeat;
background-color: black;
}

.box{
background: rgba(255,255,255,0.9);
width:350px;
margin:120px auto;
padding:30px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
}

h2{
margin-bottom:20px;
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:95%;
padding:12px;
margin-top:10px;
background:#e91e63;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#d81b60;
}

#msg{
margin-top:15px;
font-weight:bold;
color:green;
}

</style>

</head>

<body>

<div class="box">

<h2>Wedding RSVP</h2>

<input type="text" id="name" placeholder="Your Name">

<input type="number" id="people" placeholder="Number of people joining">

<button onclick="send()">Submit</button>

<p id="msg"></p>

</div>

<script>

function send(){

var name = document.getElementById("name").value;
var people = document.getElementById("people").value;

fetch("https://script.google.com/macros/s/AKfycby-kbv-Rw9SI0MH6p68MAZcUJtKuCRmeeiAGOtFR9ZkTFaEX-rcUnB_pxiesFKPq18/exec",{
method:"POST",
body:new URLSearchParams({
"name":name,
"people":people
})
})
.then(res=>res.text())
.then(data=>{
document.getElementById("msg").innerHTML="Thank you! Your response has been recorded.";
});

}

</script>

</body>

</html>
