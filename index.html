<!DOCTYPE html>
<html>

<head>
<title>Wedding RSVP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

background-image:url("background.jpeg");
background-size:cover;
background-position:center;
}

/* VIDEO BACKGROUND */

#bgvideo{
position:fixed;
top:0;
left:0;
min-width:100%;
min-height:100%;
object-fit:cover;
z-index:-1;
}

/* GLASS BOX */

.box{
background:rgba(255,255,255,0.25); /* MORE TRANSPARENT */
width:90%;
max-width:420px;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
text-align:center;

backdrop-filter:blur(15px);
-webkit-backdrop-filter:blur(15px);
}

h2{
margin-bottom:20px;
color:#8B0000;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.yes{
background:#8B0000;
color:white;
}

.no{
background:#b22222;
color:white;
}

.submit{
background:#a0003a;
color:white;
}

#msg{
margin-top:20px;
font-size:18px;
font-weight:bold;
color:#8B0000;
}

</style>
</head>

<body>

<!-- VIDEO BACKGROUND -->

<video autoplay muted loop playsinline webkit-playsinline id="bgvideo">
<source src="wedding.mp4" type="video/mp4">
</video>

<div class="box">

<div id="step1">
<h2>Are you coming to the wedding on May 3rd? 💍</h2>

<button class="yes" onclick="coming()">Yes, I'll be there!</button>
<button class="no" onclick="notcoming()">Sadly no 😢</button>
</div>

<div id="step2" style="display:none">

<h2>Awesome! 🎉</h2>

<input type="text" id="name" placeholder="Your Name">

<input type="number" id="people" placeholder="Number of people joining">

<button class="submit" id="submitBtn" onclick="send()">Submit</button>

</div>

<div id="step3" style="display:none">
<p id="msg"></p>
</div>

</div>

<script>

/* MOBILE VIDEO FIX */

window.addEventListener("load",function(){

var video=document.getElementById("bgvideo");

var playPromise=video.play();

if(playPromise!==undefined){
playPromise.catch(function(){
video.muted=true;
video.play();
});
}

});

/* YES */

function coming(){

document.getElementById("step1").style.display="none";
document.getElementById("step2").style.display="block";

}

/* NO */

function notcoming(){

document.getElementById("bgvideo").style.display="none";

/* MULTIPLE GIF OPTIONS */

var gifs=[

"https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif",
"https://media.giphy.com/media/3o6ZtaO9BZHcOjmErm/giphy.gif",
"https://media.giphy.com/media/l3q2K5jinAlChoCLS/giphy.gif",
"https://media.giphy.com/media/OPU6wzx8JrHna/giphy.gif",
"https://media.giphy.com/media/3oEjI6SIIHBdRxXI40/giphy.gif"

];

/* RANDOM GIF */

var gif=gifs[Math.floor(Math.random()*gifs.length)];

document.body.style.backgroundImage="url('"+gif+"')";
document.body.style.backgroundSize="cover";
document.body.style.backgroundPosition="center";

document.getElementById("step1").style.display="none";
document.getElementById("step3").style.display="block";

var noJokes=[

"We'll miss you... but we'll eat your cake 🍰",
"More dancing space for us 💃",
"The cake will remember this!",
"Your chair will feel very empty 😢",
"No worries, we'll party extra hard!",
"We forgive you... maybe 😅",
"We'll send pictures of the cake you missed!",
"Your dance moves will be missed!",
"The DJ will still play your song!",
"Sad... but we'll survive!"

];

var joke=noJokes[Math.floor(Math.random()*noJokes.length)];

document.getElementById("msg").innerHTML=joke;

}

/* SUBMIT */

function send(){

var name=document.getElementById("name").value;
var people=document.getElementById("people").value;

document.getElementById("submitBtn").innerHTML="Submitting...";

fetch("https://script.google.com/macros/s/AKfycby-kbv-Rw9SI0MH6p68MAZcUJtKuCRmeeiAGOtFR9ZkTFaEX-rcUnB_pxiesFKPq18/exec",{
method:"POST",
body:new URLSearchParams({
"name":name,
"people":people
})
})
.then(res=>res.text())
.then(data=>{

document.getElementById("step2").style.display="none";
document.getElementById("step3").style.display="block";

var normalJokes=[

"See you May 3rd! Bring dancing shoes 🕺",
"Prepare for legendary dance moves 💃",
"Come hungry... cake awaits 🍰",
"The DJ has been warned about you 😄",
"Wedding memories loading...",
"Party mode activated!",
"Hope you're ready for great food!",
"Dance floor legend incoming!",
"Your seat is ready!",
"Let the celebration begin!"

];

var bigGroupJokes=[

"Wow bringing the whole squad! 🎉",
"We'll need extra cake!",
"That's a full table right there!",
"Party level just increased!",
"The squad is coming!",
"Looks like VIP guests arrived!",
"The dance floor just got crowded!",
"This wedding just got louder!",
"More guests = more fun!",
"Now THIS is a party!"

];

var message;

if(people>4){
message=bigGroupJokes[Math.floor(Math.random()*bigGroupJokes.length)];
}else{
message=normalJokes[Math.floor(Math.random()*normalJokes.length)];
}

document.getElementById("msg").innerHTML=message;

});

}

</script>

</body>
</html>
