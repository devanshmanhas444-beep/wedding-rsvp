<!DOCTYPE html>
<html>
<head>

<title>Wedding RSVP</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

.box{
background:white;
width:350px;
margin:120px auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input,button{
width:90%;
padding:10px;
margin:10px;
}

button{
background:#e91e63;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>Wedding RSVP</h2>

<input type="text" id="name" placeholder="Your Name">

<input type="number" id="people" placeholder="Number of people joining">

<button onclick="send()">Submit</button>

<p id="msg"></p>

</div>

<script>

function send(){

var name=document.getElementById("name").value;
var people=document.getElementById("people").value;

fetch("https://script.google.com/macros/s/AKfycby-kbv-Rw9SI0MH6p68MAZcUJtKuCRmeeiAGOtFR9ZkTFaEX-rcUnB_pxiesFKPq18/exec",{
method:"POST",
body:new URLSearchParams({
"name":name,
"people":people
})
})
.then(res=>res.text())
.then(data=>{
document.getElementById("msg").innerHTML="Thank you! Your response has been recorded.";
});

}

</script>

</body>
</html>
