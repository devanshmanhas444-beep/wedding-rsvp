<!DOCTYPE html>
<html>

<head>
<title>Wedding RSVP</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial;
margin:0;
height:100vh;

background-image: url("background.jpeg");
background-size: contain;
background-position: center;
background-repeat: no-repeat;
background-color: black;

display:flex;
justify-content:center;
align-items:center;
}

/* RSVP BOX */

.box{
background: rgba(255,255,255,0.92);
width:90%;
max-width:420px;
padding:40px;
border-radius:14px;
box-shadow:0 0 20px rgba(0,0,0,0.35);
text-align:center;
}

h2{
margin-bottom:25px;
font-size:28px;
}

/* INPUTS */

input{
width:100%;
padding:14px;
margin:12px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

/* BUTTON */

button{
width:100%;
padding:14px;
margin-top:15px;
background:#e91e63;
color:white;
border:none;
border-radius:6px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#d81b60;
}

#msg{
margin-top:15px;
font-weight:bold;
color:green;
font-size:16px;
}

</style>

</head>

<body>

<div class="box">

<h2>Wedding RSVP</h2>

<input type="text" id="name" placeholder="Your Name">

<input type="number" id="people" placeholder="Number of people joining">

<button onclick="send()">Submit</button>

<p id="msg"></p>

</div>

<script>

function send(){

var name=document.getElementById("name").value;
var people=document.getElementById("people").value;

fetch("https://script.google.com/macros/s/AKfycby-kbv-Rw9SI0MH6p68MAZcUJtKuCRmeeiAGOtFR9ZkTFaEX-rcUnB_pxiesFKPq18/exec",{
method:"POST",
body:new URLSearchParams({
"name":name,
"people":people
})
})
.then(res=>res.text())
.then(data=>{
document.getElementById("msg").innerHTML="Thank you! Your response has been recorded.";
});

}

</script>

</body>

</html>
